{% extends "encyclopedia/layout.html" %}

{% block title %}Create New Page{% endblock %}

{% block body %}
    <h1>Create New Wiki Entry</h1>
    
    {% if error %}
        <div style="color: red; margin-bottom: 10px;">{{ error }}</div>
    {% endif %}

    <form action="{% url 'new_page' %}" method="post">
        {% csrf_token %}
        <div>
            <input type="text" name="title" placeholder="Entry Title" required style="width: 100%; margin-bottom: 10px; padding: 5px;">
        </div>
        <div>
            <textarea name="content" placeholder="Write your content here using Markdown..." rows="10" required style="width: 100%; margin-bottom: 10px; padding: 5px;"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Entry</button>
    </form>
{% endblock %}
